services:
  - type: web
    name: tsatracker-com
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /healthz
    disk:
      name: tsa-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: POLL_SECONDS
        value: "120"
      - key: DB_PATH
        value: /data/data.db
      - key: COLLECT_NOW_TOKEN
        generateValue: true
  - type: worker
    name: tsatracker-collector
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python collector.py --loop
    disk:
      name: tsa-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: POLL_SECONDS
        value: "120"
      - key: DB_PATH
        value: /data/data.db
